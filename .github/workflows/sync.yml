# Deterministischer Wochen-Sync (KEIN LLM): liest den Dokumentindex von
# ratsinfo.erlangen.de neu ein, lädt neue Sitzungsdokumente, komprimiert
# übergroße PDFs und committet die Neuzugänge nach main. Der anschließende
# Push löst den Build-&-Deploy-Workflow aus.
#
# Die LLM-gestützte Analyse (enrichment/docs/*.md) passiert NICHT hier,
# sondern manuell und lokal über den IDE-KI-Agenten — siehe enrichment/README.md.
name: Weekly Sync (Ratsinfo)

on:
  schedule:
    # Donnerstag 04:00 Europe/Berlin. Cron in Actions ist UTC ohne
    # Sommerzeit-Umstellung, daher beide Varianten (eine feuert je nach
    # DST tatsächlich um 04:00 Ortszeit, die andere um 03:00/05:00 — die
    # Idempotenz des Sync macht den doppelten Lauf unschädlich).
    - cron: "0 2 * * 4"   # 04:00 MESZ (Sommerzeit)
    - cron: "0 3 * * 4"   # 04:00 MEZ  (Winterzeit)
  workflow_dispatch:

# Nur ein Sync gleichzeitig; laufende nicht abbrechen (Downloads).
concurrency:
  group: ratsinfo-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pypdf pymupdf

      - name: Enable pre-commit size hook
        run: git config core.hooksPath .githooks

      - name: Sync documents from Ratsinfo (no LLM)
        run: python uvp_agent.py --sync

      # Geodaten für den Karten-Tab: OpenStreetMap (Tempo-30-Netz, Einrichtungen)
      # und das amtliche Straßenverzeichnis der Stadt. Nur Standardbibliothek,
      # keine pip-Abhängigkeit. Fällt der Abruf aus (Overpass überlastet), bleiben
      # die vorhandenen Dateien im Repo stehen — der Sync selbst soll nicht scheitern.
      - name: Refresh geodata (OpenStreetMap + Open Data Erlangen)
        continue-on-error: true
        run: python tools/fetch_geodata.py

      # Beratungsfolge der Vorlagen (welches Gremium wann mit welchem Ergebnis).
      # Inkrementell: nur Vorlagen, die noch nicht in beratungsfolge.json stehen.
      # Wie beim Geodaten-Schritt darf ein Ausfall den Sync nicht scheitern lassen.
      - name: Refresh Beratungsfolge (Ratsinfo)
        continue-on-error: true
        run: python tools/fetch_beratungsfolge.py

      # Tagesordnungen der Nachbargremien (Stadtrat, Bauausschuss). Nur
      # Metadaten, keine Dokumente — ein Request je Sitzung, inkrementell.
      - name: Refresh Tagesordnungen der Nachbargremien
        continue-on-error: true
        run: python tools/fetch_gremien_tops.py

      - name: Commit new documents
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet && git diff --cached --quiet; then
            echo "Keine neuen Dokumente — nichts zu committen."
            exit 0
          fi
          git add -A
          # Pre-Commit-Hook (>10MB-Sperre) läuft mit; scheitert er, bricht der Job ab.
          git commit -m "Weekly Ratsinfo sync: new committee documents

          Automated deterministic sync (uvp_agent.py --sync): refreshed index,
          downloaded new documents, compressed oversized PDFs. No LLM.
          Document summaries are generated separately and manually."
          git push origin HEAD:main
